name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint-and-typecheck:
    name: Lint & type-check
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Lockfile in sync with package.json
        run: npm run check:lockfile

      # Fail on known-vulnerable PRODUCTION deps (what actually ships to users via
      # `npm install --omit=dev`). Scoped to high/critical to avoid blocking PRs on
      # fix-less moderate advisories; transitive moderate ones are handled by
      # Dependabot security updates. DevDeps are excluded — they never reach users.
      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

      - name: TypeScript lint
        run: npm run lint

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test

  # Simulates pi's real install path: a `git:` install runs `npm install
  # --omit=dev`, which triggers `prepare` → `build:dist` FROM SOURCE with the
  # dev-only @types/node ABSENT. That's the path that broke with TS2688 (#193)
  # and that the tarball-based install-test never exercises (#194) — the tarball
  # ships pre-built dist/, so it never re-runs the build under --omit=dev.
  prod-install-build:
    name: Production install build (--omit=dev, from source)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      # --omit=dev omits @types/node (a devDep); typescript is a runtime dep so
      # tsc is present. This is the exact environment pi builds dist in.
      - name: Install without devDeps (--omit=dev)
        run: npm install --omit=dev --no-audit --no-fund

      - name: Build dist from source under --omit=dev (the prepare path)
        run: npm run build:dist

      - name: Verify dist built and the compiled entry loads
        run: |
          test -f dist/index.js || \
            (echo "ERROR: dist/index.js not built under --omit=dev (TS2688? prepare/build:dist failed)" && exit 1)
          node dist/index.js 2>&1 | tee /tmp/load.txt || true
          # ERR_MODULE_NOT_FOUND = a runtime dep was wrongly in devDependencies.
          # pi-coding-agent is a host-provided peer; its absence is expected here.
          if grep -q "ERR_MODULE_NOT_FOUND\|Cannot find module" /tmp/load.txt \
             && ! grep -q "pi-coding-agent" /tmp/load.txt; then
            echo "FAILED: missing runtime module under --omit=dev"
            cat /tmp/load.txt
            exit 1
          fi
          echo "Production --omit=dev build + load OK"

  install-test:
    name: Install test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: [lint-and-typecheck, test]
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Rule catalog report (non-blocking)
        continue-on-error: true
        run: npm run audit:rule-catalog

      - name: Pack tarball
        run: npm pack

      - name: Verify required files in tarball
        shell: bash
        run: |
          TARBALL=$(ls pi-lens-*.tgz)
          echo "Checking tarball: $TARBALL"
          tar -tzf "$TARBALL" | grep -E "scripts/download-grammars\.js|dist/index\.js|package\.json" | sort
          tar -tzf "$TARBALL" | grep "scripts/download-grammars.js" || \
            (echo "ERROR: scripts/download-grammars.js missing from tarball" && exit 1)
          # The published entry is compiled JS (prepare builds dist/); pi loads it
          # directly instead of jiti-transpiling source on every startup (#182).
          tar -tzf "$TARBALL" | grep "package/dist/index.js" || \
            (echo "ERROR: dist/index.js missing from tarball (prepare build failed?)" && exit 1)
          # Skills ship at the package root (skills/); pi.skills is "../../skills",
          # resolved relative to the dist entry FILE (dist/index.js) back to root.
          tar -tzf "$TARBALL" | grep "package/skills/" || \
            (echo "ERROR: skills/ missing from tarball" && exit 1)
          # Guard against accidentally shipping TS source again (reintroduces the
          # jiti transpile-on-startup cost).
          if tar -tzf "$TARBALL" | grep -E "package/(index\.ts|clients/.*\.ts)"; then
            echo "ERROR: TypeScript source leaked into the tarball" && exit 1
          fi

      - name: Verify package.json entry points exist in tarball
        shell: bash
        run: |
          TARBALL=$(ls pi-lens-*.tgz)
          TMPDIR=$(mktemp -d)
          tar -xzf "$TARBALL" -C "$TMPDIR"

          check_field() {
            local field="$1" value="$2"
            if [ ! -f "$TMPDIR/package/$value" ]; then
              echo "ERROR: package.json '$field' points to '$value' which is missing from the tarball"
              exit 1
            fi
            echo "OK: $field -> $value"
          }

          # Pass PKG dir via env var so Node gets the right path on all platforms
          export PI_LENS_PKG_DIR="$TMPDIR/package"
          MAIN=$(node -p "require(process.env.PI_LENS_PKG_DIR + '/package.json').main || ''" 2>/dev/null)
          [ -n "$MAIN" ] && check_field "main" "$MAIN"

          # Check pi.extensions entries — this is what pi actually loads.
          node -e "
            const path = require('path'); const fs = require('fs');
            const pkgDir = process.env.PI_LENS_PKG_DIR;
            const pkg = require(path.join(pkgDir, 'package.json'));
            const exts = (pkg.pi && pkg.pi.extensions) || [];
            if (exts.length === 0) { console.error('ERROR: no pi.extensions declared'); process.exit(1); }
            for (const e of exts) {
              if (!fs.existsSync(path.join(pkgDir, e))) {
                console.error('ERROR: pi.extensions entry missing from tarball: ' + e); process.exit(1);
              }
              console.log('OK: pi.extensions -> ' + e);
            }
          "

          # Check exports map entries (string values only)
          node -e "
            const path = require('path');
            const fs = require('fs');
            const pkgDir = process.env.PI_LENS_PKG_DIR;
            const pkg = require(path.join(pkgDir, 'package.json'));
            const exp = pkg.exports;
            if (!exp) process.exit(0);
            const collect = (v) => typeof v === 'string' ? [v] : typeof v === 'object' ? Object.values(v).flatMap(collect) : [];
            collect(exp).forEach(f => {
              const full = path.join(pkgDir, f);
              if (!fs.existsSync(full)) { console.error('ERROR: exports entry missing from tarball: ' + f); process.exit(1); }
              else { console.log('OK: exports -> ' + f); }
            });
          "
          rm -rf "$TMPDIR"

      - name: Install from tarball (simulates pi install npm:pi-lens)
        shell: bash
        run: |
          TARBALL=$(ls pi-lens-*.tgz)
          npm install -g "$TARBALL"

      - name: Verify grammars were downloaded
        shell: bash
        run: |
          GLOBAL_MODULES=$(npm root -g)
          GRAMMARS_DIR="$GLOBAL_MODULES/pi-lens/node_modules/web-tree-sitter/grammars"
          echo "Checking grammars at: $GRAMMARS_DIR"
          ls "$GRAMMARS_DIR"
          test -f "$GRAMMARS_DIR/tree-sitter-typescript.wasm" || \
            (echo "ERROR: tree-sitter-typescript.wasm not downloaded" && exit 1)
          echo "All grammar checks passed"

      - name: Load each extension entry point (catches missing files)
        shell: bash
        run: |
          INSTALL_DIR=$(npm root -g)/pi-lens
          node scripts/check-extensions.mjs "$INSTALL_DIR"

      - name: Verify extension entry loads (catches missing node_modules deps)
        shell: bash
        run: |
          INSTALL_DIR=$(npm root -g)/pi-lens
          cd "$INSTALL_DIR"
          # Simulate how pi loads the extension: the compiled entry, loaded by node.
          # ERR_MODULE_NOT_FOUND = missing dep (e.g. 'minimatch') → fail
          # Any other error = expected in CI (no pi API available) → pass
          # pi-coding-agent is a host-provided peer dep; its absence is expected here
          ENTRY=$(node -p "require('./package.json').pi.extensions[0]")
          echo "Loading entry: $ENTRY"
          node "$ENTRY" 2>&1 | tee /tmp/load-output.txt || true
          if grep -q "ERR_MODULE_NOT_FOUND\|Cannot find module" /tmp/load-output.txt \
             && ! grep -q "pi-coding-agent" /tmp/load-output.txt; then
            echo "FAILED: missing module dependency detected"
            cat /tmp/load-output.txt
            exit 1
          fi
          echo "Extension import check passed"

      - name: Startup not weakened — entry loads from precompiled dist (#182)
        shell: bash
        run: |
          # Loading the entry above made pi-lens self-report its load source to
          # ~/.pi-lens/sessionstart.log ("pi-lens loaded: <ms>ms ... (from dist)").
          # A regression to source/jiti (or a missing dist) would weaken cold
          # start; assert the fast precompiled path is the one in effect.
          START_LINE=$(grep "pi-lens loaded:" "$HOME/.pi-lens/sessionstart.log" 2>/dev/null | tail -1 || true)
          echo "Startup line: ${START_LINE:-<none>}"
          if [ -z "$START_LINE" ]; then
            echo "ERROR: no startup line logged — extension_loaded timing missing"
            exit 1
          fi
          echo "$START_LINE" | grep -q "from dist" || \
            (echo "ERROR: extension loaded from source, not precompiled dist — startup regression (#182)" && exit 1)
          echo "Startup loads from dist ✓"

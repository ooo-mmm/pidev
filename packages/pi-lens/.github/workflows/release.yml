name: Release

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
      should_release: ${{ steps.meta.outputs.should_release }}
      has_npm_token: ${{ steps.meta.outputs.has_npm_token }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Compute release metadata
        id: meta
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="v$VERSION"

          # Release if the version tag doesn't exist yet. The tag check is the
          # sole guard — no need to also require package.json in the diff, which
          # breaks when the version bump and changelog land in separate commits.
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            SHOULD_RELEASE=false
          else
            SHOULD_RELEASE=true
          fi

          # Check if NPM_TOKEN secret is configured
          if [ -n "$NPM_TOKEN" ]; then
            HAS_NPM_TOKEN=true
          else
            HAS_NPM_TOKEN=false
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "should_release=$SHOULD_RELEASE" >> "$GITHUB_OUTPUT"
          echo "has_npm_token=$HAS_NPM_TOKEN" >> "$GITHUB_OUTPUT"

      - name: Verify changelog entry exists
        if: steps.meta.outputs.should_release == 'true'
        shell: bash
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          if ! grep -q "^## \[$VERSION\]" CHANGELOG.md; then
            echo "Missing CHANGELOG entry for version $VERSION"
            exit 1
          fi

      - uses: actions/setup-node@v6
        if: steps.meta.outputs.should_release == 'true' && steps.meta.outputs.has_npm_token == 'true'
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        if: steps.meta.outputs.should_release == 'true' && steps.meta.outputs.has_npm_token == 'true'
        run: npm install --no-audit --no-fund

      - name: Dry-run publish (validates tarball + registry auth)
        if: steps.meta.outputs.should_release == 'true' && steps.meta.outputs.has_npm_token == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --dry-run

      # The dry-run above runs prepare (tsc → dist/), so the compiled entry now
      # exists in the working tree. Load it to catch a broken/missing-dep entry
      # before we tag and publish (#182).
      - name: Smoke-load compiled entry
        if: steps.meta.outputs.should_release == 'true' && steps.meta.outputs.has_npm_token == 'true'
        shell: bash
        run: |
          ENTRY=$(node -p "require('./package.json').pi.extensions[0]")
          echo "Loading entry: $ENTRY"
          node "$ENTRY" 2>&1 | tee /tmp/load-output.txt || true
          if grep -q "ERR_MODULE_NOT_FOUND\|Cannot find module" /tmp/load-output.txt \
             && ! grep -q "pi-coding-agent" /tmp/load-output.txt; then
            echo "FAILED: missing module dependency in compiled entry"
            cat /tmp/load-output.txt
            exit 1
          fi
          echo "Compiled entry loads OK"

  release:
    runs-on: ubuntu-latest
    needs: prepare
    if: needs.prepare.outputs.should_release == 'true'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Create and push tag
        shell: bash
        run: |
          git tag "${{ needs.prepare.outputs.tag }}"
          git push origin "${{ needs.prepare.outputs.tag }}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: ${{ needs.prepare.outputs.tag }}
          generate_release_notes: true

  publish-npm:
    runs-on: ubuntu-latest
    needs: [prepare, release]
    if: needs.prepare.outputs.should_release == 'true' && needs.prepare.outputs.has_npm_token == 'true'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      # Required: the `prepare` script builds dist/ (tsc), which needs
      # node_modules. `npm install` runs prepare here, and `npm publish` runs it
      # again before packing. Without the install the build — and the publish —
      # fails.
      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish

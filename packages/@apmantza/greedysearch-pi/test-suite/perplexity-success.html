<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Perplexity — Success Scenario</title>
<style>
  body { font-family: sans-serif; padding: 20px; max-width: 800px; margin: 0 auto; }
  .query-box { border: 1px solid #e0e0e0; border-radius: 8px; padding: 16px; }
  #search-input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 4px; }
  .answer { background: #f9f9f9; padding: 16px; margin-top: 16px; border-radius: 8px; }
  .sources { margin-top: 12px; padding: 12px; background: #fff; border-radius: 4px; }
  .sources a { display: block; margin: 4px 0; }
  .copy-btn { background: #333; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; }
</style>
</head>
<body>
<h1>Perplexity</h1>
<div class="query-box">
  <textarea id="search-input" placeholder="Ask anything..."></textarea>
</div>
<div class="answer" id="answer">
  <p><strong>Answer</strong></p>
  <p>This is a simulated successful Perplexity response. The clipboard interceptor is active and captures the answer when the copy button is clicked. Sources are embedded as markdown links.</p>
  <div class="sources">
    <p><strong>Sources</strong></p>
    <a href="https://example.com/source1">Example Source 1</a>
    <a href="https://example.com/source2">Example Source 2</a>
  </div>
  <button class="copy-btn" id="copy-btn">
    <svg><use xlink:href="#pplx-icon-copy"></use></svg>
  </button>
</div>

<script>
(function() {
  window.__mode = 'visible';
  window.__verdict = 'pass';
  window.__reason = 'Perplexity loads normally, stream completes, clipboard interceptor captures answer on copy button click. Sources parsed from markdown.';
  window.__events = ['navigate:perplexity.ai', 'detect:input-ready', 'type:query', 'submit:enter', 'stream:complete', 'copy:success', 'parse:sources'];
  window.__expectedEnvelope = {
    engine: 'perplexity',
    mode: 'visible',
    blockedBy: null,
    verificationResult: 'clear',
    clipboardEmpty: false,
    fallbackUsed: null
  };

  // Working clipboard interceptor simulation
  window.__pplxClipboard = null;
  const _orig = navigator.clipboard.writeText.bind(navigator.clipboard);
  navigator.clipboard.writeText = function(text) {
    window.__pplxClipboard = text;
    return _orig(text);
  };
})();
</script>
</body>
</html>

name: Release

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
      should_release: ${{ steps.meta.outputs.should_release }}
      has_npm_token: ${{ steps.meta.outputs.has_npm_token }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Compute release metadata
        id: meta
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="v$VERSION"

          # Release if the version tag doesn't exist yet. The tag check is the
          # sole guard — no need to also require package.json in the diff, which
          # breaks when the version bump and changelog land in separate commits.
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            SHOULD_RELEASE=false
          else
            SHOULD_RELEASE=true
          fi

          if [ -n "$NPM_TOKEN" ]; then
            HAS_NPM_TOKEN=true
          else
            HAS_NPM_TOKEN=false
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "should_release=$SHOULD_RELEASE" >> "$GITHUB_OUTPUT"
          echo "has_npm_token=$HAS_NPM_TOKEN" >> "$GITHUB_OUTPUT"

      - name: Verify CHANGELOG entry exists
        if: steps.meta.outputs.should_release == 'true'
        shell: bash
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          if ! grep -q "^## \[$VERSION\]" CHANGELOG.md; then
            echo "Missing CHANGELOG entry for version $VERSION"
            echo "Expected a line like: ## [$VERSION] — YYYY-MM-DD"
            exit 1
          fi

      - name: Verify all files listed in package.json are in the tarball
        if: steps.meta.outputs.should_release == 'true'
        shell: bash
        run: |
          npm pack
          TARBALL=$(ls *.tgz)
          TMPDIR=$(mktemp -d)
          tar -xzf "$TARBALL" -C "$TMPDIR"

          # Verify the pi.extensions and pi.skills entry points exist
          export GS_PKG_DIR="$TMPDIR/package"
          node -e "
            const path = require('path');
            const fs = require('fs');
            const pkgDir = process.env.GS_PKG_DIR;
            const pkg = require(path.join(pkgDir, 'package.json'));
            const pi = pkg.pi || {};
            const entries = []
              .concat(pi.extensions || [])
              .concat(pi.skills || [])
              .concat(pkg.files || []);
            for (const entry of entries) {
              // directories end with / — just check the first file inside
              const full = path.join(pkgDir, entry);
              if (entry.endsWith('/')) {
                if (!fs.existsSync(full) || !fs.readdirSync(full).length) {
                  console.error('ERROR: pi/files directory missing or empty in tarball: ' + entry);
                  process.exit(1);
                }
                console.log('OK: dir -> ' + entry);
              } else {
                if (!fs.existsSync(full)) {
                  console.error('ERROR: pi/files entry missing from tarball: ' + entry);
                  process.exit(1);
                }
                console.log('OK: file -> ' + entry);
              }
            }
          "
          rm -rf "$TMPDIR"

      - uses: actions/setup-node@v6
        if: steps.meta.outputs.should_release == 'true' && steps.meta.outputs.has_npm_token == 'true'
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Dry-run publish (validates tarball + registry auth)
        if: steps.meta.outputs.should_release == 'true' && steps.meta.outputs.has_npm_token == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --dry-run

  release:
    runs-on: ubuntu-latest
    needs: prepare
    if: needs.prepare.outputs.should_release == 'true'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Create and push tag
        shell: bash
        run: |
          git tag "${{ needs.prepare.outputs.tag }}"
          git push origin "${{ needs.prepare.outputs.tag }}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: ${{ needs.prepare.outputs.tag }}
          generate_release_notes: true

  publish-npm:
    runs-on: ubuntu-latest
    needs: [prepare, release]
    if: needs.prepare.outputs.should_release == 'true' && needs.prepare.outputs.has_npm_token == 'true'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish
